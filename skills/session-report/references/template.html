<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Report - {{date}}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292e; max-width: 800px; margin: 0 auto; padding: 2rem; }
        h1, h2, h3 { border-bottom: 1px solid #eaecef; padding-bottom: .3em; }
        .card { border: 1px solid #e1e4e8; border-radius: 6px; padding: 16px; margin-bottom: 16px; background-color: #f6f8fa; }
        .success { border-left: 4px solid #28a745; }
        table { border-collapse: collapse; width: 100%; margin: 16px 0; }
        table th, table td { border: 1px solid #dfe2e5; padding: 6px 13px; text-align: left; }
        table tr:nth-child(2n) { background-color: #f6f8fa; }
        code { background-color: rgba(27,31,35,.05); border-radius: 3px; padding: .2em .4em; font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; }
    </style>
</head>
<body>
    <h1>Session Report: {{topic}}</h1>
    <p><strong>Date:</strong> {{date}} | <strong>Project:</strong> HarnessAI</p>

    <div class="card success">
        <h2>Executive Summary</h2>
        {{summary}}
    </div>

    <h2>Wiki Changes</h2>
    {{wiki_table}}

    <h2>Decisions & Insights</h2>
    {{decisions}}

    <h2>Next Steps</h2>
    {{next_steps}}

    <hr>
    <h3>Technical Appendix</h3>
    <pre><code>{{git_log}}</code></pre>
</body>
</html>
